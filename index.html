<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1020" />
    <title>Camera</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell shell--compact">
      <section class="panel camera-panel">
        <div class="video-frame">
          <video id="video" autoplay playsinline muted></video>
          <canvas id="analysis" width="320" height="240" aria-hidden="true"></canvas>
        </div>
      </section>

      <section class="panel controls-panel">
        <div class="controls primary-controls">
          <button id="armBtn" class="primary">Arm camera + audio</button>
        </div>

        <div class="sliders">
          <label>
            Cooldown
            <input id="cooldown" type="range" min="3000" max="15000" step="500" value="8000" />
            <span id="cooldownValue">8000 ms</span>
          </label>
          <label>
            Lead pull-away threshold
            <input id="leadDistance" type="range" min="0.5" max="4" step="0.1" value="1.6" />
            <span id="leadDistanceValue">1.6x</span>
          </label>
        </div>

        <div class="settings">
          <div class="settings-head">Sound settings</div>
          <label class="toggle">
            <input id="yellowSoundToggle" type="checkbox" />
            <span>Yellow sound</span>
          </label>
          <label class="toggle">
            <input id="redSoundToggle" type="checkbox" />
            <span>Red sound</span>
          </label>
          <p class="settings-note">Green stays on by default. Lead-car pull-away also uses the green tone.</p>
        </div>
      </section>
    </main>

    <script src="./vendor/tf.es2017.min.js"></script>
    <script src="./vendor/coco-ssd.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
